version: '3'

# Deployment and Vercel-plumbing tasks for Spaceforge.
# Run `task` or `task --list-all` to see everything available.
#
# Prereq (one-time): `npx vercel@latest login` and `task link` to bind
# this working directory to the Vercel project.

vars:
  VERCEL: npx --yes vercel@latest
  PROJECT: spaceforge

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  # --- Vercel project plumbing -------------------------------------------

  link:
    desc: Link this repo to the spaceforge Vercel project (creates .vercel/)
    cmds:
      - '{{.VERCEL}} link --project {{.PROJECT}} --yes'

  status:
    desc: Show latest Vercel deployments + linked project info
    cmds:
      - '{{.VERCEL}} ls --scope ronreiters-projects | head -20'
      - '{{.VERCEL}} inspect {{.PROJECT}} 2>&1 | head -30 || true'

  whoami:
    desc: Print the currently authenticated Vercel user
    cmds:
      - '{{.VERCEL}} whoami'

  # --- Environment variables ---------------------------------------------

  env:ls:
    desc: List env var names configured on Vercel (never prints values)
    cmds:
      - '{{.VERCEL}} env ls'

  env:pull:
    desc: Pull development env vars into .env.local (overwrites)
    cmds:
      - '{{.VERCEL}} env pull .env.local --yes'

  env:add:
    desc: Add an env var interactively. Usage — task env:add -- MY_VAR
    cmds:
      - '{{.VERCEL}} env add {{.CLI_ARGS}}'

  env:rm:
    desc: Remove an env var. Usage — task env:rm -- MY_VAR production
    cmds:
      - '{{.VERCEL}} env rm {{.CLI_ARGS}}'

  # --- Domains -----------------------------------------------------------

  domains:
    desc: List domains attached to this project
    cmds:
      - '{{.VERCEL}} domains ls'

  domains:inspect:
    desc: Inspect a domain (DNS, cert, nameserver status). Usage — task domains:inspect -- spaceforge.dev
    cmds:
      - '{{.VERCEL}} domains inspect {{.CLI_ARGS}}'

  # --- Deploy ------------------------------------------------------------

  deploy:preview:
    desc: Create a preview deployment (branch/PR style URL)
    cmds:
      - '{{.VERCEL}} deploy'

  deploy:
    desc: Deploy to production (spaceforge.dev once DNS is wired)
    cmds:
      - '{{.VERCEL}} deploy --prod'

  logs:
    desc: Stream runtime logs from the latest production deployment
    cmds:
      - '{{.VERCEL}} logs $({{.VERCEL}} ls {{.PROJECT}} --scope ronreiters-projects | awk "/Production/ {print \$2; exit}")'

  # --- Local development -------------------------------------------------

  setup:
    desc: One-shot local bootstrap — docker up, migrate, seed dev user
    cmds:
      - npm install
      - docker compose up -d
      - sleep 2
      - npm run db:migrate
      - DATABASE_URL=postgres://spaceforge:spaceforge@localhost:5432/spaceforge npm run db:seed:dev

  dev:
    desc: Run the full local stack — Next.js + AUTH_DRIVER=dev + FsBlobDriver + Docker Postgres
    deps: [backend:up]
    cmds:
      - npm run dev:local

  dev:vercel:
    desc: Run `vercel dev` — reads env from Vercel, uses real Clerk/Neon/Blob
    cmds:
      - '{{.VERCEL}} dev'

  # --- Backend plumbing (Docker Postgres) --------------------------------

  backend:up:
    desc: Start local Postgres in Docker (idempotent)
    cmds:
      - docker compose up -d
      - docker compose ps

  backend:down:
    desc: Stop local Postgres (keeps data in the named volume)
    cmds:
      - docker compose down

  backend:wipe:
    desc: Stop Postgres AND wipe the data volume. Re-run task setup after.
    cmds:
      - docker compose down -v

  backend:logs:
    desc: Tail Postgres logs
    cmds:
      - docker compose logs -f postgres

  backend:psql:
    desc: Open a psql shell inside the Postgres container
    cmds:
      - docker exec -it spaceforge-postgres psql -U spaceforge -d spaceforge

  # --- Database (Drizzle) ------------------------------------------------

  db:migrate:
    desc: Apply pending Drizzle migrations to local Postgres
    cmds:
      - npm run db:migrate

  db:generate:
    desc: Generate a migration from schema changes. Usage — task db:generate -- --name my_change
    cmds:
      - npm run db:generate -- {{.CLI_ARGS}}

  db:seed:
    desc: Insert the dev user + team so AUTH_DRIVER=dev has something to reference
    cmds:
      - DATABASE_URL=postgres://spaceforge:spaceforge@localhost:5432/spaceforge npm run db:seed:dev

  db:studio:
    desc: Open Drizzle Studio in your browser to browse the DB
    cmds:
      - DATABASE_URL=postgres://spaceforge:spaceforge@localhost:5432/spaceforge npm run db:studio

  # --- Quality -----------------------------------------------------------

  build:
    desc: Production build (next build)
    cmds:
      - npm run build

  typecheck:
    desc: TypeScript typecheck
    cmds:
      - npm run typecheck

  test:
    desc: Run vitest once
    cmds:
      - npm run test

  e2e:
    desc: Run the Playwright headless walk-through (dev server must already be running)
    cmds:
      - npm run e2e
